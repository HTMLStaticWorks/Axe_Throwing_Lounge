<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | AXORA Lounge</title>
  <meta name="description" content="Access your AXORA account to check current bookings, update profiles, and view payment histories.">
  
  <!-- CDNs -->
  <link id="bootstrap-link" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    }
    .auth-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body>

  <!-- Controls (Top Right) -->
  <div class="auth-controls">
            <a href="dashboard.html" class="btn-icon" aria-label="Dashboard" title="Dashboard">
          <i class="fa-solid fa-circle-user fs-5"></i>
        </a>
        <button class="btn-icon" id="theme-toggle" aria-label="Toggle Theme"><i class="bi bi-sun-fill"></i></button>
    <button class="btn-icon dir-toggle" id="dir-toggle" aria-label="Toggle Direction"><i class="bi bi-arrow-left-right"></i></button>
  </div>

  <!-- Centered Login Card -->
  <main class="container">
    <div class="row justify-content-center">
      <div class="col-md-6 col-lg-4">
        
        <div class="text-center mb-4">
          <!-- Custom Logo -->
          <a class="d-inline-flex align-items-center text-decoration-none" href="index.html">
            <svg width="45" height="45" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="me-2">
              <!-- Target Background -->
              <circle cx="50" cy="50" r="45" stroke="url(#targetGrad)" stroke-width="6" fill="#121318"/>
              <circle cx="50" cy="50" r="30" stroke="url(#targetGrad)" stroke-width="4" stroke-opacity="0.7"/>
              <circle cx="50" cy="50" r="15" fill="url(#targetGrad)" />
              
              <!-- Crossed Axes -->
              <g transform="rotate(45 50 50)">
                <rect x="46" y="20" width="8" height="60" rx="4" fill="#EAECEF" />
                <path d="M42 20 Q 30 15 30 30 Q 30 45 42 40 L 58 40 Q 70 45 70 30 Q 70 15 58 20 Z" fill="url(#axeGrad)" />
              </g>
              <g transform="rotate(-45 50 50)">
                <rect x="46" y="20" width="8" height="60" rx="4" fill="#EAECEF" />
                <path d="M42 20 Q 30 15 30 30 Q 30 45 42 40 L 58 40 Q 70 45 70 30 Q 70 15 58 20 Z" fill="url(#axeGrad)" />
              </g>
              
              <defs>
                <linearGradient id="axeGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#FF5E00" />
                  <stop offset="100%" stop-color="#FF8C32" />
                </linearGradient>
                <linearGradient id="targetGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#FF5E00" />
                  <stop offset="100%" stop-color="#FFD600" />
                </linearGradient>
              </defs>
            </svg>
            <span class="fs-4 fw-extrabold text-uppercase">AX<span class="text-gradient">ORA</span></span>
          </a>
        </div>

        <div class="glass-card">
          <h1 class="text-white h4 uppercase text-center mb-4">Login</h1>
          
          <form class="needs-validation" novalidate id="login-form">
            <div class="mb-3">
              <label for="login-email" class="form-label fs-8 text-secondary">Email Address</label>
              <input type="email" class="form-control" id="login-email" required>
            </div>
            
            <div class="mb-3">
              <label for="login-pass" class="form-label fs-8 text-secondary">Password</label>
              <div class="input-group">
                <input type="password" class="form-control" id="login-pass" required>
                <button class="btn btn-outline-secondary border-color" type="button" id="pass-toggle" style="background: rgba(255,255,255,0.03);">
                  <i class="bi bi-eye-fill text-secondary"></i>
                </button>
              </div>
            </div>

            <div class="d-flex justify-content-between align-items-center mb-4 fs-8">
              <div class="form-check">
                <input class="form-check-input" type="checkbox" id="remember-me">
                <label class="form-check-label text-secondary" for="remember-me">Remember Me</label>
              </div>
              <a href="coming-soon.html" class="text-primary text-decoration-none hover-link fw-semibold">Forgot Password?</a>
            </div>

            <button type="submit" class="btn btn-premium w-100 mb-3">Sign In</button>
          </form>

          <!-- Social logins -->
          <div class="text-center my-3 text-muted fs-8">OR CONTINUE WITH</div>
          <div class="row g-2 mb-4">
            <div class="col-6">
              <a href="dashboard.html" class="btn btn-outline-secondary border-color w-100 fs-8 py-2 text-white" style="background: rgba(255,255,255,0.03);">
                <i class="bi bi-google text-primary me-2"></i> Google
              </a>
            </div>
            <div class="col-6">
              <a href="dashboard.html" class="btn btn-outline-secondary border-color w-100 fs-8 py-2 text-white" style="background: rgba(255,255,255,0.03);">
                <i class="bi bi-apple text-white me-2"></i> Apple
              </a>
            </div>
          </div>

          <div class="text-center fs-8 text-secondary">
            Don't have an account? <a href="register.html" class="text-primary text-decoration-none hover-link fw-semibold">Sign Up</a>
          </div>
        </div>

      </div>
    </div>
  </main>

  <!-- Bootstrap JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Toggle eye password visibility
      const btnToggle = document.getElementById('pass-toggle');
      const passInput = document.getElementById('login-pass');
      
      btnToggle.addEventListener('click', () => {
        const type = passInput.getAttribute('type') === 'password' ? 'text' : 'password';
        passInput.setAttribute('type', type);
        btnToggle.querySelector('i').className = type === 'password' ? 'bi bi-eye-fill text-secondary' : 'bi bi-eye-slash-fill text-secondary';
      });

      // Form Submit
      const loginForm = document.getElementById('login-form');
      loginForm.addEventListener('submit', (e) => {
        if (loginForm.checkValidity()) {
          e.preventDefault();
          window.location.href = 'dashboard.html';
        }
      });
    });
  </script>
  <!-- Core script (handles themes & RTL overrides if controls are used) -->
  <script src="assets/js/main.js"></script>
</body>
</html>
