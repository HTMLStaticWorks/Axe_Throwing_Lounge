<!DOCTYPE html>
<html lang="en" data-bs-theme="dark" dir="ltr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Opening Soon - Teaser | AXORA Lounge</title>
  <meta name="description" content="AXORA Axes is opening soon. Sign up to get early-access VIP reservation access and lounge entry rewards.">
  
  <!-- CDNs -->
  <link id="bootstrap-link" rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">
  
  <!-- Custom CSS -->
  <link rel="stylesheet" href="assets/css/style.css">
  <link rel="stylesheet" href="assets/css/dark-mode.css">
  <link rel="stylesheet" href="assets/css/rtl.css">
  
  <style>
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      position: relative;
      background: linear-gradient(135deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
    }
    .teaser-controls {
      position: absolute;
      top: 20px;
      right: 20px;
      display: flex;
      gap: 10px;
    }
  </style>
  <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
</head>
<body>

  <!-- Controls (Top Right) -->
  <div class="teaser-controls">
            <a href="dashboard.html" class="btn-icon" aria-label="Dashboard" title="Dashboard">
          <i class="fa-solid fa-circle-user fs-5"></i>
        </a>
        <button class="btn-icon theme-toggle" id="theme-toggle" aria-label="Toggle Theme"><i class="bi bi-sun-fill"></i></button>
    <button class="btn-icon dir-toggle" id="dir-toggle" aria-label="Toggle Direction"><i class="bi bi-arrow-left-right"></i></button>
  </div>

  <main class="container text-center py-5">
    <div class="row justify-content-center">
      <div class="col-md-9 col-lg-7 col-xl-6">
        
        <div class="glass-card py-5 px-4 px-md-5">
          <!-- Logo -->
          <div class="mb-4">
            <svg width="45" height="45" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg" class="d-block mx-auto mb-2 text-primary">
              <path d="M50 10L10 35H40V90H60V35H90L50 10Z" fill="url(#axeGrad)" />
              <defs>
                <linearGradient id="axeGrad" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#FF5E00" />
                  <stop offset="100%" stop-color="#FF8C32" />
                </linearGradient>
              </defs>
            </svg>
            <span class="fs-3 fw-extrabold text-uppercase text-white">AX<span class="text-gradient">ORA</span></span>
          </div>

          <span class="badge-premium mb-3">Opening July 2026</span>
          <h1 class="text-white h3 uppercase font-heading text-gradient mb-3">Urban Target Lounge Arriving Soon</h1>
          <p class="text-secondary fs-7 mb-4">
            We are structuring Metropolis's premier luxury nightlife throwing lounge. Register for early access queue tickets and a 20% opening discount.
          </p>

          <!-- Countdown timer grids -->
          <div class="row g-2 max-width-400 mx-auto mb-4">
            <div class="col-3">
              <div class="bg-black p-2 rounded">
                <div class="fs-4 fw-bold text-white font-monospace" id="timer-days">30</div>
                <div class="fs-8 text-muted uppercase">Days</div>
              </div>
            </div>
            <div class="col-3">
              <div class="bg-black p-2 rounded">
                <div class="fs-4 fw-bold text-white font-monospace" id="timer-hours">12</div>
                <div class="fs-8 text-muted uppercase">Hrs</div>
              </div>
            </div>
            <div class="col-3">
              <div class="bg-black p-2 rounded">
                <div class="fs-4 fw-bold text-white font-monospace" id="timer-mins">45</div>
                <div class="fs-8 text-muted uppercase">Mins</div>
              </div>
            </div>
            <div class="col-3">
              <div class="bg-black p-2 rounded">
                <div class="fs-4 fw-bold text-white font-monospace" id="timer-secs">10</div>
                <div class="fs-8 text-muted uppercase">Secs</div>
              </div>
            </div>
          </div>

          <!-- Newsletter form -->
          <form class="needs-validation" novalidate id="teaser-form">
            <div class="input-group">
              <input type="email" class="form-control" placeholder="Enter your email" required>
              <button class="btn btn-premium px-4" type="submit">Join Priority List</button>
            </div>
          </form>

        </div>

      </div>
    </div>
  </main>

  <!-- Bootstrap JS CDN -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Countdown Timer Logic
      const targetDate = new Date();
      targetDate.setDate(targetDate.getDate() + 30); // 30 days from now

      function updateCountdown() {
        const now = new Date().getTime();
        const diff = targetDate.getTime() - now;

        const days = Math.floor(diff / (1000 * 60 * 60 * 24));
        const hours = Math.floor((diff % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
        const minutes = Math.floor((diff % (1000 * 60 * 60)) / (1000 * 60));
        const seconds = Math.floor((diff % (1000 * 60)) / 1000);

        document.getElementById('timer-days').textContent = days;
        document.getElementById('timer-hours').textContent = hours;
        document.getElementById('timer-mins').textContent = minutes;
        document.getElementById('timer-secs').textContent = seconds;
      }

      setInterval(updateCountdown, 1000);
      updateCountdown();

      // Submit
      document.getElementById('teaser-form').addEventListener('submit', (e) => {
        e.preventDefault();
        alert('Thank you! You have been added to our priority invite queue.');
        e.target.reset();
      });
    });
  </script>
  <script src="assets/js/main.js"></script>
</body>
</html>
